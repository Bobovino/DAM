<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
	"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<head>
<title>posiciones cuadrícula</title>

<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />



<style type="text/css">
#general{margin :30px;
         border :2px solid red;
         height:400px;
         width:700px;
         }

#caja1 {
	position:relative;
	top: 50px;
	left: 50px;
}

#caja2 {
	position:relative;
	top: 50px;
	right: 50px;
}

#caja3 {
	position:relative;
	bottom: 50px;
	right: 50px;
}

#caja4 {
	position:relative;
	bottom: 50px;
	left: 50px;
      }
</style>
</head>
<body>

<div id="general">

<div id="caja1">
caja 1
</div>

<div id="caja2">
caja 2
</div>

<div id="caja3">
caja 3
</div>

<div id="caja4">
caja 4
</div>
</div>

</body>
</html>
